{% extends "base.html" %}

{% block content %}
<style>
    body {
        background: url('/static/images/dog1.jpg') no-repeat center center fixed !important;
        background-size: cover !important;
    }
</style>
<div class="d-flex justify-content-center align-items-center flex-column" style="min-height: 80vh;">
    <div class="glass-card w-100" style="max-width: 1000px; padding: 40px;">
        <div class="d-flex gap-3 justify-content-center mb-4 flex-wrap">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-primary px-4 py-2 fw-semibold" style="border-radius: 8px;">👥 Registered Users</a>
            <a href="{{ url_for('admin_vaccinations') }}" class="btn btn-outline-primary px-4 py-2 fw-semibold" style="border-radius: 8px; border-color: #4a6cf7; color: #4a6cf7;">💉 Vaccinations</a>
            <a href="{{ url_for('admin_grooming') }}" class="btn btn-outline-primary px-4 py-2 fw-semibold" style="border-radius: 8px; border-color: #4a6cf7; color: #4a6cf7;">✂️ Grooming</a>
        </div>
        <h2 class="page-title text-center mb-4">Registered Users</h2>

        <div class="table-responsive">
            <table class="table table-hover table-bordered" style="background: white; border-radius: 10px; overflow: hidden;">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Password</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.password }}</td>
                        <td class="text-center">
                            <a href="{{ url_for('edit_user', user_id=user.id) }}" class="btn btn-sm btn-primary" style="margin-right: 5px;">Edit</a>
                            <a href="{{ url_for('delete_user', user_id=user.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
